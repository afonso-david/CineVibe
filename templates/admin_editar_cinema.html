<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cinema - CineVibe Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='imgs/Logo/logo.png') }}">
</head>
<body>
    
    <header class="admin-header">
        <div class="container">
            <div class="admin-logo">
                <a href="{{ url_for('admin_dashboard') }}">
                    <img src="{{ url_for('static', filename='imgs/Logo/logo.png') }}" alt="CineVibe Admin">
                    <span>Admin</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                <a href="{{ url_for('admin_filmes') }}">Filmes</a>
                <a href="{{ url_for('admin_cinemas') }}">Cinemas</a>
                <a href="{{ url_for('admin_usuarios') }}">Utilizadores</a>
                <a href="{{ url_for('admin_reservas') }}">Reservas</a>
                <a href="{{ url_for('home') }}">Voltar ao Site</a>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        
        <div class="admin-container">
            <h1>🏢 Editar Cinema</h1>
            
            <form method="POST" class="admin-form">
                <div class="form-group">
                    <label for="nome">Nome do Cinema:</label>
                    <input type="text" id="nome" name="nome" value="{{ cinema.nome if cinema else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label for="localizacao">Localização:</label>
                    <input type="text" id="localizacao" name="localizacao" value="{{ cinema.localizacao if cinema else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label for="regiao">Região:</label>
                    <select id="regiao" name="regiao" required>
                        <option value="">Selecione uma região</option>
                        <option value="Norte" {{ 'selected' if cinema and cinema.regiao == 'Norte' else '' }}>Norte</option>
                        <option value="Centro" {{ 'selected' if cinema and cinema.regiao == 'Centro' else '' }}>Centro</option>
                        <option value="Sul" {{ 'selected' if cinema and cinema.regiao == 'Sul' else '' }}>Sul</option>
                        <option value="Ilhas" {{ 'selected' if cinema and cinema.regiao == 'Ilhas' else '' }}>Ilhas</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" value="{{ cinema.telefone if cinema else '' }}">
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" value="{{ cinema.email if cinema else '' }}">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Alterações</button>
                    <a href="{{ url_for('admin_cinemas') }}" class="btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="admin-footer">
        <div class="container">
            <p>&copy; 2025 CineVibe Admin Panel. Todos os direitos reservados.</p>
        </div>
    </footer>
    <script>
        window.addEventListener('load', function() {
            document.body.classList.add('loaded');
        });
    </script>
</body>
</html>
