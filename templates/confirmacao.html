<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação | CineVibe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/confirmacao.css') }}">
</head>
<body>
    <main class="confirmacao-content">
        <h1>✅ Confirmação</h1>
        <p>A sua operação foi realizada com sucesso!</p>
        
        <div class="confirmacao-detalhes">
            <h2>Detalhes da Operação</h2>
            <p>{{ mensagem if mensagem else 'Operação concluída com sucesso.' }}</p>
        </div>
        
        <a href="{{ url_for('home') }}" class="btn-voltar">Voltar ao Início</a>
    </main>
</body>
</html>
