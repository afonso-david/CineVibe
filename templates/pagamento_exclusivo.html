<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Exclusivo | CineVibe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">
    <link rel="icon" type="image/x-icon" href="
    .resumo-exclusivo h3 {
        color: #FFD60A;
        margin-bottom: 20px;
        font-size: 1.5rem;
    }
    .resumo-item {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid rgba(255, 214, 10, 0.2);
    }
    .resumo-item:last-child {
        border-bottom: none;
    }
    .resumo-label {
        color: #ccc;
    }
    .resumo-value {
        color: #fff;
        font-weight: 600;
    }
    .total-final {
        font-size: 1.5rem;
        color: #FFD60A;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 2px solid #FFD60A;
    }
</style>
{% endblock %}

{% block content %}
<main class="main-content">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-crown"></i> Pagamento Sessão Exclusiva</h1>
            <p>Finalize o pagamento da sua experiência exclusiva</p>
        </div>
        
        <div class="checkout-container">
            
            <div class="resumo-section">
                <div class="resumo-exclusivo">
                    <h3><i class="fas fa-ticket-alt"></i> Resumo da Reserva</h3>
                    <div id="resumoConteudo">
                        <p style="color: #ccc; text-align: center;">Carregando dados...</p>
                    </div>
                </div>
            </div>

            <div class="pagamento-section">
                <div class="section-header">
                    <h2><i class="fas fa-credit-card"></i> Método de Pagamento</h2>
                </div>

                <div class="payment-methods-grid">
                    <div class="payment-method" data-method="mbway">
                        <img src="{{ url_for('static', filename='imgs/pagamento/Quais_sao_as_vantagens_de_aderir_ao_MBway-removebg-preview (1).png') }}" alt="MB WAY">
                        <span>MB WAY</span>
                    </div>
                    <div class="payment-method" data-method="paypal">
                        <img src="{{ url_for('static', filename='imgs/pagamento/paypal-removebg-preview.png') }}" alt="PayPal">
                        <span>PayPal</span>
                    </div>
                    <div class="payment-method" data-method="mastercard">
                        <img src="{{ url_for('static', filename='imgs/pagamento/mastercard.png') }}" alt="Mastercard">
                        <span>Mastercard</span>
                    </div>
                    <div class="payment-method" data-method="visa">
                        <img src="{{ url_for('static', filename='imgs/pagamento/visa.png') }}" alt="Visa">
                        <span>Visa</span>
                    </div>
                    <div class="payment-method" data-method="applepay">
                        <img src="{{ url_for('static', filename='imgs/pagamento/apple-removebg-preview.png') }}" alt="Apple Pay">
                        <span>Apple Pay</span>
                    </div>
                </div>

                <div class="payment-forms">
                    <div id="form-mbway" class="payment-form" style="display: none;">
                        <h3><i class="fas fa-mobile-alt"></i> MB WAY</h3>
                        <input type="tel" placeholder="Número de telemóvel" id="telemovel-mbway" maxlength="9">
                    </div>

                    <div id="form-card" class="payment-form" style="display: none;">
                        <h3><i class="fas fa-credit-card"></i> Cartão de Crédito/Débito</h3>
                        <input type="text" placeholder="Número do cartão" id="numero-cartao" maxlength="19">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <input type="text" placeholder="MM/AA" id="validade-cartao" maxlength="5">
                            <input type="text" placeholder="CVV" id="cvv-cartao" maxlength="3">
                        </div>
                        <input type="text" placeholder="Nome no cartão" id="nome-cartao">
                    </div>
                </div>

                <button class="btn-finalizar" onclick="finalizarPagamento()">
                    <i class="fas fa-lock"></i>
                    Finalizar Pagamento
                </button>
            </div>
        </div>
    </div>
</main>

<div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
    <div style="text-align: center; color: #FFD60A;">
        <i class="fas fa-spinner fa-spin" style="font-size: 3rem; margin-bottom: 20px;"></i>
        <p style="font-size: 1.2rem;">Processando pagamento...</p>
    </div>
</div>

<script>
let dadosReserva = {};
let metodoSelecionado = null;

document.addEventListener('DOMContentLoaded', function() {
    carregarDadosReserva();
    configurarMetodosPagamento();
});

function carregarDadosReserva() {
    const dados = sessionStorage.getItem('dadosReservaExclusiva');
    if (dados) {
        dadosReserva = JSON.parse(dados);
        exibirResumo();
    } else {
        document.getElementById('resumoConteudo').innerHTML = '<p style="color: #ff6b6b;">Nenhuma reserva encontrada. <a href="/sessoes-tematicas" style="color: #FFD60A;">Voltar</a></p>';
    }
}

function exibirResumo() {
    const html = `
        <div class="resumo-item">
            <span class="resumo-label">Sala:</span>
            <span class="resumo-value">${dadosReserva.tipo_sala || 'N/A'}</span>
        </div>
        <div class="resumo-item">
            <span class="resumo-label">Filme:</span>
            <span class="resumo-value">${dadosReserva.filme_nome || 'N/A'}</span>
        </div>
        <div class="resumo-item">
            <span class="resumo-label">Data:</span>
            <span class="resumo-value">${dadosReserva.data_sessao || 'N/A'}</span>
        </div>
        <div class="resumo-item">
            <span class="resumo-label">Horário:</span>
            <span class="resumo-value">${dadosReserva.hora_sessao || 'N/A'}</span>
        </div>
        <div class="resumo-item">
            <span class="resumo-label">Pessoas:</span>
            <span class="resumo-value">${dadosReserva.num_pessoas || 0}</span>
        </div>
        <div class="resumo-item total-final">
            <span class="resumo-label">Total:</span>
            <span class="resumo-value">€${dadosReserva.total || '0.00'}</span>
        </div>
    `;
    document.getElementById('resumoConteudo').innerHTML = html;
}

function configurarMetodosPagamento() {
    document.querySelectorAll('.payment-method').forEach(method => {
        method.addEventListener('click', function() {
            document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
            this.classList.add('selected');
            metodoSelecionado = this.dataset.method;
            
            document.querySelectorAll('.payment-form').forEach(form => form.style.display = 'none');
            
            if (metodoSelecionado === 'mbway') {
                document.getElementById('form-mbway').style.display = 'block';
            } else if (metodoSelecionado === 'mastercard' || metodoSelecionado === 'visa') {
                document.getElementById('form-card').style.display = 'block';
            }
        });
    });
}

function finalizarPagamento() {
    if (!metodoSelecionado) {
        alert('Por favor, selecione um método de pagamento');
        return;
    }
    
    document.getElementById('loadingOverlay').style.display = 'flex';
    
    const dadosPagamento = {
        ...dadosReserva,
        metodo_pagamento: metodoSelecionado
    };
    
    fetch('/api/processar-pagamento-exclusivo', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(dadosPagamento)
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loadingOverlay').style.display = 'none';
        
        if (data.success) {
            sessionStorage.removeItem('dadosReservaExclusiva');
            alert('Pagamento processado com sucesso! Reserva confirmada.');
            window.location.href = '/home';
        } else {
            alert(data.message || 'Erro ao processar pagamento. Tente novamente.');
        }
    })
    .catch(error => {
        document.getElementById('loadingOverlay').style.display = 'none';
        console.error('Erro:', error);
        alert('Erro ao processar pagamento. Tente novamente.');
    });
}
</script>
{% endblock %}
