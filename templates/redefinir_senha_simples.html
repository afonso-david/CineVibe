<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha | CineVibe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/redefinir_senha.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔐 Redefinir Senha</h1>
        <p>Digite sua nova senha abaixo</p>
        
        <div class="token-info">Token: {{ token }}</div>
        
        <div id="message"></div>
        
        <form id="form">
            <input type="hidden" id="token" value="{{ token }}">
            <input type="password" id="novaSenha" placeholder="Digite a nova senha (mínimo 6 caracteres)" required>
            <input type="password" id="confirmarSenha" placeholder="Confirme a nova senha" required>
            <button type="button" onclick="redefinir()">Redefinir Senha</button>
        </form>
        
        <div class="back-link">
            <a href="/login">← Voltar ao Login</a>
        </div>
    </div>

    <script>
        function showMessage(msg, type) {
            document.getElementById('message').innerHTML = `<div class="message ${type}">${msg}</div>`;
        }

        function redefinir() {
            const token = document.getElementById('token').value;
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            
            if (!novaSenha || !confirmarSenha) {
                showMessage('Preencha todos os campos', 'error');
                return;
            }
            
            if (novaSenha !== confirmarSenha) {
                showMessage('Senhas não coincidem', 'error');
                return;
            }
            
            if (novaSenha.length < 6) {
                showMessage('Senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }
            
            const button = document.querySelector('button');
            button.disabled = true;
            button.textContent = 'Redefinindo...';
            
            fetch('/api/redefinir-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: token,
                    novaSenha: novaSenha,
                    confirmarSenha: confirmarSenha
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('✅ Senha redefinida com sucesso! Redirecionando...', 'success');
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showMessage('❌ ' + (data.message || 'Erro ao redefinir'), 'error');
                }
            })
            .catch(error => {
                showMessage('❌ Erro de conexão', 'error');
                console.error(error);
            })
            .finally(() => {
                button.disabled = false;
                button.textContent = 'Redefinir Senha';
            });
        }

        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                redefinir();
            }
        });
    </script>
</body>
</html>
