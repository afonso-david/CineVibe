<!DOCTYPE html>
<html>
<head>
    <title>Teste Clique Básico</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        .card { 
            background: #333; 
            border: 2px solid #FFD60A; 
            padding: 20px; 
            margin: 10px; 
            cursor: pointer; 
            display: inline-block;
            border-radius: 10px;
        }
        .card:hover { background: #555; }
        .card.selected { 
            background: #FFD60A; 
            color: #000; 
        }
    </style>
</head>
<body>
    <h1>Teste de Clique Básico</h1>
    
    <div class="card" onclick="testeClique(1)">
        <h2>1</h2>
        <p>BILHETE</p>
    </div>
    
    <div class="card" onclick="testeClique(2)">
        <h2>2</h2>
        <p>BILHETES</p>
    </div>
    
    <div class="card" onclick="testeClique(3)">
        <h2>3</h2>
        <p>BILHETES</p>
    </div>
    
    <br><br>
    <button onclick="proximoPasso()" style="padding: 10px 20px; font-size: 16px;">
        CONTINUAR
    </button>
    
    <div id="log" style="background: #222; padding: 10px; margin-top: 20px; font-family: monospace;"></div>
    
    <script>
        function log(msg) {
            document.getElementById('log').innerHTML += '<br>' + msg;
            console.log(msg);
        }
        
        log('JavaScript carregado!');
        
        function testeClique(num) {
            log('Clicou em: ' + num);
            alert('Clicou em: ' + num);
            
            // Remover seleção
            document.querySelectorAll('.card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Adicionar seleção
            event.target.closest('.card').classList.add('selected');
        }
        
        function proximoPasso() {
            log('Próximo passo clicado!');
            alert('Próximo passo funcionando!');
        }
    </script>
</body>
</html>
