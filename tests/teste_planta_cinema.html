<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planta Cinema - Visual Exato</title>
    <style>
        body {
            background: #0f0f23;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .screen {
            background: linear-gradient(135deg, #FFD60A 0%, #FFA726 100%);
            color: #0f0f23;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 5px 20px rgba(255, 214, 10, 0.4);
            border: 2px solid #FFB703;
        }
        
        .screen::before {
            content: '🎬 ';
            font-size: 1.3rem;
        }
        
        .cinema-layout {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            position: relative;
        }
        
        .cinema-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-bottom: 3px;
            position: relative;
        }
        
        .cinema-seat {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #4EA8DE 0%, #2E86AB 100%);
            border: 1px solid #1B5E7A;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }
        
        .cinema-seat:hover {
            background: linear-gradient(135deg, #FFD60A 0%, #FFA726 100%) !important;
            border-color: #FFD60A !important;
            transform: scale(1.2) !important;
            z-index: 10 !important;
            box-shadow: 0 0 10px rgba(255, 214, 10, 0.6) !important;
        }
        
        .cinema-seat.selected {
            background: linear-gradient(135deg, #FFD60A 0%, #FFA726 100%) !important;
            border-color: #FFD60A !important;
            color: #0f0f23 !important;
            transform: scale(1.1) !important;
            box-shadow: 0 0 15px rgba(255, 214, 10, 0.8) !important;
            z-index: 10 !important;
        }
        
        .cinema-seat.occupied {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%) !important;
            border-color: #1a252f !important;
            cursor: not-allowed !important;
            color: #7f8c8d !important;
        }
        
        .corridor {
            width: 20px;
            height: 25px;
            background: linear-gradient(180deg, #ff4757 0%, #c44569 100%);
            margin: 0 5px;
            border-radius: 3px;
            position: relative;
        }
        
        .access-icon {
            color: #00D9FF;
            font-size: 20px;
            background: rgba(0, 217, 255, 0.2);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00D9FF;
            position: absolute;
        }
        
        .bathroom-icon {
            color: #00D9FF;
            font-size: 30px;
            background: rgba(0, 217, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00D9FF;
            position: absolute;
        }
        
        .info-bar {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00D9FF;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        
        .selected-info {
            color: #FFD60A;
            font-weight: bold;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #FFD60A;">🎬 2. Escolha os lugares</h1>
        <p style="text-align: center; color: #B8C5D1; margin-bottom: 30px;">Selecione 2 lugares na sala</p>
        
        <div class="screen">ECRÃ</div>
        
        <div class="cinema-layout" id="cinemaLayout">
            <!-- A planta será gerada aqui -->
        </div>
        
        <div class="info-bar">
            🎯 Clique nos lugares desejados na planta acima
            <span class="selected-info" id="selectedInfo">Lugares selecionados: E29, E30</span>
        </div>
    </div>

    <script>
        let selectedSeats = [];
        let maxSeats = 2;
        
        function generateCinemaLayout() {
            const container = document.getElementById('cinemaLayout');
            
            // Configuração da sala - igual à imagem
            const config = {
                rows: 15,
                seatsPerRow: 32,
                corridorPosition: 16,
                accessibilityRows: [5, 9],
                occupiedSeats: [
                    'H8', 'H9', 'H10', 'H11', 'H12', 'H13', 'H14', 'H15',
                    'H18', 'H19', 'H20', 'H21', 'H22', 'H23', 'H24', 'H25'
                ]
            };
            
            // Criar filas
            for (let row = 0; row < config.rows; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'cinema-row';
                
                const rowLetter = String.fromCharCode(65 + row);
                
                // Ícones de acessibilidade
                if (config.accessibilityRows.includes(row)) {
                    const leftIcon = document.createElement('div');
                    leftIcon.innerHTML = '♿';
                    leftIcon.className = 'access-icon';
                    leftIcon.style.left = '-40px';
                    rowDiv.appendChild(leftIcon);
                    
                    const rightIcon = document.createElement('div');
                    rightIcon.innerHTML = '♿';
                    rightIcon.className = 'access-icon';
                    rightIcon.style.right = '-40px';
                    rowDiv.appendChild(rightIcon);
                }
                
                // Criar lugares
                for (let seat = 1; seat <= config.seatsPerRow; seat++) {
                    const seatId = `${rowLetter}${seat}`;
                    
                    // Corredor central
                    if (seat === config.corridorPosition) {
                        const corridor = document.createElement('div');
                        corridor.className = 'corridor';
                        if (row % 3 === 0) {
                            corridor.style.borderTop = '2px dashed rgba(255, 255, 255, 0.3)';
                        }
                        rowDiv.appendChild(corridor);
                        continue;
                    }
                    
                    const seatDiv = document.createElement('div');
                    seatDiv.className = 'cinema-seat';
                    seatDiv.dataset.seatId = seatId;
                    seatDiv.title = `Lugar ${seatId}`;
                    
                    // Verificar se está ocupado
                    if (config.occupiedSeats.includes(seatId)) {
                        seatDiv.innerHTML = '✕';
                        seatDiv.classList.add('occupied');
                        seatDiv.title = 'Lugar ocupado';
                    } else {
                        seatDiv.addEventListener('click', function() {
                            toggleSeat(seatId);
                        });
                    }
                    
                    rowDiv.appendChild(seatDiv);
                }
                
                container.appendChild(rowDiv);
            }
            
            // Ícones de banheiro
            const bathroomLeft = document.createElement('div');
            bathroomLeft.innerHTML = '🚻';
            bathroomLeft.className = 'bathroom-icon';
            bathroomLeft.style.bottom = '20px';
            bathroomLeft.style.left = '20px';
            container.appendChild(bathroomLeft);
            
            const bathroomRight = document.createElement('div');
            bathroomRight.innerHTML = '🚻';
            bathroomRight.className = 'bathroom-icon';
            bathroomRight.style.bottom = '20px';
            bathroomRight.style.right = '20px';
            container.appendChild(bathroomRight);
        }
        
        function toggleSeat(seatId) {
            const seatElement = document.querySelector(`[data-seat-id="${seatId}"]`);
            const isSelected = selectedSeats.includes(seatId);
            
            if (isSelected) {
                // Remover seleção
                selectedSeats = selectedSeats.filter(id => id !== seatId);
                seatElement.classList.remove('selected');
                seatElement.innerHTML = '';
            } else {
                // Verificar limite
                if (selectedSeats.length >= maxSeats) {
                    alert(`Você só pode selecionar ${maxSeats} lugares.`);
                    return;
                }
                
                // Adicionar seleção
                selectedSeats.push(seatId);
                seatElement.classList.add('selected');
                seatElement.innerHTML = '✓';
            }
            
            // Atualizar info
            document.getElementById('selectedInfo').textContent = 
                `Lugares selecionados: ${selectedSeats.join(', ') || 'Nenhum'}`;
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            generateCinemaLayout();
            
            // Simular seleção inicial
            setTimeout(() => {
                toggleSeat('E29');
                toggleSeat('E30');
            }, 500);
        });
    </script>
</body>
</html>
