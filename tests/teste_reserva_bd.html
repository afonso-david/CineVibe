<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Reserva BD - CineVibe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f23;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #FFD60A;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #FFD60A;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 5px;
        }
        button {
            background: linear-gradient(135deg, #FFD60A 0%, #FFA726 100%);
            color: #0f0f23;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background: linear-gradient(135deg, #FFA726 0%, #FFD60A 100%);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Teste Reserva Base de Dados</h1>
        <p>Teste rápido para verificar se os dados são salvos na BD</p>
        
        <form id="testForm">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="nome" value="João Silva" required>
            </div>
            
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" value="joao@teste.com" required>
            </div>
            
            <div class="form-group">
                <label>Telefone:</label>
                <input type="tel" id="telefone" value="+351 912 345 678">
            </div>
            
            <div class="form-group">
                <label>Lugares (separados por vírgula):</label>
                <input type="text" id="lugares" value="A1,A2" required>
            </div>
            
            <div class="form-group">
                <label>Método de Pagamento:</label>
                <select id="pagamento">
                    <option value="card">Cartão</option>
                    <option value="mbway">MB WAY</option>
                    <option value="paypal">PayPal</option>
                </select>
            </div>
            
            <button type="submit">🎫 CONFIRMAR RESERVA TESTE</button>
        </form>
        
        <div id="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dados = {
                horario: 1,
                cinema: 1,
                tipo: 1,
                filme_id: 1,
                data_sessao: '2026-01-08',
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                lugares: document.getElementById('lugares').value.split(',').map(l => l.trim()),
                produtos_bar: {},
                metodo_pagamento: document.getElementById('pagamento').value,
                total_bilhetes: 17.00,
                total_produtos: 0,
                total_geral: 17.00
            };
            
            console.log('📊 Enviando dados:', dados);
            
            fetch('/confirmar_reserva', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(dados)
            })
            .then(response => response.json())
            .then(data => {
                console.log('✅ Resposta:', data);
                
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.className = 'result';
                    resultDiv.innerHTML = `
                        <h3>✅ Sucesso!</h3>
                        <p><strong>Reserva ID:</strong> ${data.reserva_id || 'N/A'}</p>
                        <p><strong>Lugares:</strong> ${dados.lugares.join(', ')}</p>
                        <p><strong>Total:</strong> €${dados.total_geral.toFixed(2)}</p>
                        <p><strong>Cliente:</strong> ${dados.nome}</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Erro!</h3>
                        <p>${data.message || 'Erro desconhecido'}</p>
                    `;
                }
            })
            .catch(error => {
                console.error('❌ Erro:', error);
                
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Erro de Conexão!</h3>
                    <p>${error.message}</p>
                `;
            });
        });
    </script>
</body>
</html>
